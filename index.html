
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { background: #0b0f19; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
    video { width: 100%; max-width: 400px; border: 2px solid #ff7597; border-radius: 15px; }
    .btn { background: #ff7597; padding: 10px 20px; border: none; border-radius: 5px; color: white; cursor: pointer; }
</style>
</head>
<body>

    <video id="vid" controls>
        <source src="v1.mp4" type="video/mp4">
    </video>
    <br><br>
    <button class="btn" onclick="swap()">Next Video 🎬</button>
    <br><br>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <script>
        let toggle = false;
        function swap() {
            let v = document.getElementById('vid');
            v.src = toggle ? "v1.mp4" : "v2.mp4";
            v.play();
            toggle = !toggle;
        }
    </script>
</body>
</html>
